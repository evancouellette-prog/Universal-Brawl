name: Patch practice settings

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'Save practice settings and move button') }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch game.js only
        run: |
          python3 <<'PY'
          from pathlib import Path

          game = Path('game.js')
          text = game.read_text(encoding='utf-8')

          # Default fallback should be stationary dummy OFF.
          text = text.replace('stationaryDummy: true,', 'stationaryDummy: false,')

          marker = '// CHATGPT_PRACTICE_SETTINGS_SAVE_AND_PLACEMENT_PATCH'
          if marker not in text:
              patch = r'''

// CHATGPT_PRACTICE_SETTINGS_SAVE_AND_PLACEMENT_PATCH
const PRACTICE_SETTINGS_STORAGE_KEY = "jujutsuBrawlPracticeSettingsV1";

function loadSavedPracticeSettings() {
  if (typeof practiceSettings === "undefined" || !practiceSettings) return;
  let loaded = false;
  try {
    const raw = window.localStorage.getItem(PRACTICE_SETTINGS_STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      Object.keys(practiceSettings).forEach((key) => {
        if (typeof saved[key] === "boolean") practiceSettings[key] = saved[key];
      });
      loaded = true;
    }
  } catch (err) {}

  // First-time default: dummy is NOT stationary.
  if (!loaded) practiceSettings.stationaryDummy = false;
}

function savePracticeSettings() {
  if (typeof practiceSettings === "undefined" || !practiceSettings) return;
  try {
    window.localStorage.setItem(PRACTICE_SETTINGS_STORAGE_KEY, JSON.stringify(practiceSettings));
  } catch (err) {}
}

function refreshPracticeSettingsUiSafe() {
  if (typeof updatePracticeSettingsButtons === "function") updatePracticeSettingsButtons();
  if (typeof updatePracticeSettingsUi === "function") updatePracticeSettingsUi();
}

function syncPracticeSettingsButtonPlacement() {
  if (!practiceSettingsButton || !enemyHealthEl) return;
  const active = gameMode === "practice" || !practiceSettingsButton.classList.contains("hidden");
  practiceSettingsButton.classList.toggle("practice-settings-under-dummy-hp", active);
  if (active && enemyHealthEl.parentNode && practiceSettingsButton.parentNode !== enemyHealthEl.parentNode) {
    enemyHealthEl.insertAdjacentElement("afterend", practiceSettingsButton);
  } else if (active && enemyHealthEl.nextElementSibling !== practiceSettingsButton) {
    enemyHealthEl.insertAdjacentElement("afterend", practiceSettingsButton);
  }
}

function installPracticeSettingsStyle() {
  if (document.getElementById("practiceSettingsPlacementStyle")) return;
  const style = document.createElement("style");
  style.id = "practiceSettingsPlacementStyle";
  style.textContent = `
    #practiceSettingsButton.practice-settings-under-dummy-hp {
      position: static !important;
      display: block !important;
      width: 100% !important;
      margin: 7px 0 6px 0 !important;
      padding: 6px 10px !important;
      border-radius: 10px !important;
      font-size: 0.82rem !important;
      font-weight: 900 !important;
      text-align: center !important;
      z-index: auto !important;
      transform: none !important;
    }
  `;
  document.head.appendChild(style);
}

loadSavedPracticeSettings();
installPracticeSettingsStyle();
refreshPracticeSettingsUiSafe();
syncPracticeSettingsButtonPlacement();

const originalUpdateHudForPracticeSettings = typeof updateHud === "function" ? updateHud : null;
if (originalUpdateHudForPracticeSettings && !updateHud.practiceSettingsPatched) {
  updateHud = function patchedUpdateHudForPracticeSettings() {
    originalUpdateHudForPracticeSettings();
    syncPracticeSettingsButtonPlacement();
  };
  updateHud.practiceSettingsPatched = true;
}

const originalCreatePracticeModeGameState = typeof createPracticeModeGameState === "function" ? createPracticeModeGameState : null;
if (originalCreatePracticeModeGameState && !createPracticeModeGameState.practiceSettingsPatched) {
  createPracticeModeGameState = function patchedCreatePracticeModeGameState() {
    loadSavedPracticeSettings();
    const result = originalCreatePracticeModeGameState.apply(this, arguments);
    refreshPracticeSettingsUiSafe();
    syncPracticeSettingsButtonPlacement();
    return result;
  };
  createPracticeModeGameState.practiceSettingsPatched = true;
}

const originalSetPracticeSetting = typeof setPracticeSetting === "function" ? setPracticeSetting : null;
if (originalSetPracticeSetting && !setPracticeSetting.practiceSettingsPatched) {
  setPracticeSetting = function patchedSetPracticeSetting(setting, value) {
    const result = originalSetPracticeSetting.apply(this, arguments);
    if (typeof practiceSettings !== "undefined" && practiceSettings && Object.prototype.hasOwnProperty.call(practiceSettings, setting)) {
      if (value === "on") practiceSettings[setting] = true;
      if (value === "off") practiceSettings[setting] = false;
    }
    savePracticeSettings();
    refreshPracticeSettingsUiSafe();
    syncPracticeSettingsButtonPlacement();
    return result;
  };
  setPracticeSetting.practiceSettingsPatched = true;
}

// The fallback click handler in this file toggles practice settings. This corrects it to use On/Off buttons and saves.
document.addEventListener("click", (event) => {
  const button = event.target.closest(".practice-setting-button");
  if (!button) return;
  window.setTimeout(() => {
    const key = button.dataset.setting || button.dataset.practiceSetting;
    if (key && typeof practiceSettings !== "undefined" && practiceSettings && Object.prototype.hasOwnProperty.call(practiceSettings, key)) {
      if (button.dataset.value === "on") practiceSettings[key] = true;
      if (button.dataset.value === "off") practiceSettings[key] = false;
      savePracticeSettings();
      refreshPracticeSettingsUiSafe();
      syncPracticeSettingsButtonPlacement();
    }
  }, 0);
}, true);

window.addEventListener("load", () => {
  loadSavedPracticeSettings();
  installPracticeSettingsStyle();
  refreshPracticeSettingsUiSafe();
  syncPracticeSettingsButtonPlacement();
});

window.setInterval(syncPracticeSettingsButtonPlacement, 300);
'''
              anchor = 'setupEventListeners();'
              if anchor in text:
                  text = text.replace(anchor, patch + '\n\n' + anchor, 1)
              else:
                  text += patch

          game.write_text(text, encoding='utf-8')

          wf = Path('.github/workflows/patch-practice-settings.yml')
          if wf.exists():
              wf.unlink()
          PY

      - name: Commit changes
        run: |
          git config user.name "ChatGPT"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Save practice settings and move button"
            git push
          fi
